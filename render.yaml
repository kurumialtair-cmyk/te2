services:
  - type: web
    name: te2-api
    runtime: python
    plan: starter
    region: singapore
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: USE_LOCAL_TRAINED_MODELS
        value: "0"
      - key: MAX_IMAGE_MB
        value: "8"
      - key: ALLOWED_ORIGINS
        value: "*"
